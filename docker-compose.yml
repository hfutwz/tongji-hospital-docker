# ============================================
# 服务编排
# ============================================
services:

  # ---------- MySQL ----------
  mysql:
    image: mysql:8.0
    container_name: trauma-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: healthineersvisualization
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/healthineersvisualization_2026-06-09_00-51-35_mysql_data_vdZ6M.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    container_name: trauma-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------- RabbitMQ ----------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: trauma-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5673:5672"
      - "15673:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- 预测服务 ----------
  predict:
    build:
      context: ./prediction
      dockerfile: Dockerfile
    container_name: trauma-predict
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: healthineersvisualization
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MODEL_DIR: /app/models
    volumes:
      - predict-models:/app/models
    depends_on:
      mysql:
        condition: service_healthy

  # ---------- 后端 ----------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trauma-backend
    restart: unless-stopped
    ports:
      - "9091:9090"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/healthineersvisualization?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      SPRING_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      PREDICTION_URL: http://predict:8000
      AMAP_API_KEY: ${TENCENT_MAP_KEY:-placeholder}
      WAIT_HOSTS: mysql:3306,redis:6379,rabbitmq:5672
      WAIT_HOSTS_TIMEOUT: 120
      WAIT_SLEEP_INTERVAL: 5
      WAIT_BEFORE_HOSTS: 15
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      predict:
        condition: service_started

  # ---------- 前端 ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trauma-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mysql-data:
  redis-data:
  predict-models: