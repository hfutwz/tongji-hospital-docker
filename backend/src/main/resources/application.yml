# ============================================
# Spring Boot 主配置文件
# ============================================
# 此文件包含所有环境共享的通用配置
# 环境特定配置请查看：application-dev.yml（本地开发）和 application-prod.yml（生产环境）

# ============================================
# 环境切换配置（重要！）
# ============================================
spring:
  # 激活的配置文件：dev=本地开发环境，prod=生产环境
  profiles:
    active: dev  # 本地开发使用 dev，生产环境部署时改为 prod
  
  # 通用配置（所有环境共享）
  servlet:
    multipart:
      max-file-size: 5MB        # 单个文件最大大小
      max-request-size: 50MB      # 整个请求最大大小

# ============================================
# 服务器配置（所有环境共享）
# ============================================
server:
  port: 9090
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    uri-encoding: UTF-8

# ============================================
# MyBatis配置（所有环境共享）
# ============================================
mybatis-plus:
  type-aliases-package: com.demo.entity
  mapper-locations: classpath:mapper/*.xml

# ============================================
# 腾讯位置服务 Key 配置（所有环境共享）
# ============================================
amap:
  api:
    key: RR3BZ-IZQLQ-YCW5Y-26IOE-3QK7E-IXBK5
  city: 上海

# ============================================
# 数据导入配置（所有环境共享）
# ============================================
import:
  batch:
    size: 1000  # 每批处理的记录数
  max:
    errors: 500  # 最大错误信息数量（降低到500，避免响应体过大导致序列化失败）

# ============================================
# 预测微服务配置
# ============================================
prediction:
  service:
    url: ${PREDICTION_URL:http://localhost:8000}
